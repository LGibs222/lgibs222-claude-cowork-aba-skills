title: Claude Cowork Skills for School-Based ABA
description: A teaching module for BCBAs, school psychologists, and behavior consultants who want to use Claude Cowork to streamline their school-based practice — without learning to code.

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

color_scheme: light
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub →":
    - "https://github.com/LGibs222/claude-cowork-aba-skills"
aux_links_new_tab: true

footer_content: 'Built by <a href="https://github.com/LGibs222">Lenwood Gibson Jr., Ph.D., BCBA-D</a>. Source on <a href="https://github.com/LGibs222/claude-cowork-aba-skills">GitHub</a>. Released under MIT.'

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
